[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"
# Pass the service variable into Docker build (set NEXT_PUBLIC_API_BASE in Railway → Variables, enable "Build")
dockerfileArgs = { NEXT_PUBLIC_API_BASE = "${{NEXT_PUBLIC_API_BASE}}" }

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
numReplicas = 1
